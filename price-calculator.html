.fg:last-child { margin-bottom: 0; }
label {

.res-sub { font-size: 0.8rem; opacity: 0.55; margin-bottom: 18px; }

.bd-row { display: flex; justify-content: space-between; align-items: baseline; font-size: 0.87rem; padding: 3px 0; opacity: 0.82; }
.bd-row .nm { flex: 1; padding-right: 8px; }

.empty { text-align: center; color: #bbb; font-size: 0.9rem; padding: 36px 0; }

// ── LOGIC ────────────────────────────────────────────────────────────────────
function dist(w, h, sw, sh) {
  return Math.min(Math.abs(w-sw)+Math.abs(h-sh), Math.abs(w-sh)+Math.abs(h-sw));
}

function findClosest(sizes, w, h) {
  let best=-1, bestD=Infinity, bestP=-Infinity;
  sizes.forEach((s,i) => {
    const d = dist(w, h, s.w, s.h);
    const p = s.opts[0].p.find(x => x!==null) || 0;
    if (d < bestD || (d===bestD && p > bestP)) { best=i; bestD=d; bestP=p; }
  });
  return best;
}

function computeFigCost(prices, n, extra) {
  const minFig = prices[0]===null ? 1 : 0;
  const maxFig = prices.length - 1;
  const base = prices[minFig];
  const clN = Math.max(n, minFig);
  const tableN = Math.min(clN, maxFig);
  const extraFigs = Math.max(0, clN - maxFig);
  const figCost = (prices[tableN] - base) + extraFigs * extra;
  return { base, figCost, minFig, maxFig, extraFigs, tableN };
}

function $ (id) { return document.getElementById(id); }
const fmt = v => '$' + v.toFixed(2);

function calc() {
  const w = parseFloat($('inp-w').value);
  const h = parseFloat($('inp-h').value);
  const n = parseInt($('inp-n').value) || 0;

  if (!w || !h || w<=0 || h<=0) {
    $('result-area').innerHTML = '<div class="card empty">Введите размеры выше</div>';
    $('del-sec').style.display = 'none';
    return;
  }

  const sizes = st.shop==='portraithy' ? PT : SB[st.style].sizes;
  const extra  = st.shop==='portraithy' ? null : SB[st.style].ex;

  const idx = findClosest(sizes, w, h);
  const sz  = sizes[idx];
  const multiOpt = sz.opts.length > 1;

  // Подрамник разрешён только если размер ≤ 80×100
  const canFrame = Math.min(w,h) <= 80 && Math.max(w,h) <= 100;

  const delSec = $('del-sec');
  const delSeg = $('del-seg');
  const frameWarn = $('frame-warn');
  if (multiOpt) {
    delSec.style.display = 'block';
    if (!canFrame) {
      // Форсируем тубус (idx=0), скрываем кнопки выбора
      st.delIdx = 0;
      delSeg.style.display = 'none';
      frameWarn.style.display = 'block';
    } else {
      delSeg.style.display = 'flex';
      frameWarn.style.display = 'none';
      delSeg.innerHTML = sz.opts.map((o,i) =>
        `<button class="seg-btn ${i===st.delIdx?'active':''}" onclick="setDel(${i})">${o.lb}</button>`
      ).join('');
    }
  } else {
    delSec.style.display = 'none';
    st.delIdx = 0;
  }

  const opt = sz.opts[Math.min(st.delIdx, sz.opts.length-1)];
  const sizeExtra = st.shop==='portraithy' ? sz.ex : extra;
  const { base, figCost, minFig, maxFig, extraFigs, tableN } = computeFigCost(opt.p, n, sizeExtra);

  const ratio = (w + h) / (sz.w + sz.h);
  const scaledBase = base * ratio;
  const artistExtra = parseFloat($('inp-extra').value) || 0;
  const total = scaledBase + figCost + artistExtra;

  // Breakdown labels
  const baseLabel = minFig===0 ? '0 фигур (полотно)' : '1 фигура (база)';
  let figLabel = '';
  if (n < minFig) {
    figLabel = `минимум ${minFig} фигур — приведено к ${minFig}`;
  } else if (figCost === 0) {
    figLabel = 'без доп. фигур';
  } else if (extraFigs === 0) {
    figLabel = `${n} фиг. по прайсу: ${fmt(opt.p[tableN])} − ${fmt(base)}`;
  } else {
    const tablepart = tableN>minFig ? `${tableN} фиг. из прайса (${fmt(opt.p[tableN])}−${fmt(base)})` : '';
    figLabel = `${tablepart}${tablepart?' + ':''}${extraFigs} доп. × ${fmt(sizeExtra)}`;
  }

  const ratioDir = ratio > 1 ? '▲' : ratio < 1 ? '▼' : '=';
  const ratioColor = ratio > 1 ? '#4caf50' : ratio < 1 ? '#f44336' : '#fff';

  let warn = '';
  if (extraFigs > 0) {
    warn = `<div class="warn">⚠ ${extraFigs} фигур(ы) сверх прайса — добавлено ${fmt(extraFigs*sizeExtra)} (${extraFigs} × ${fmt(sizeExtra)})</div>`;
  }

  $('result-area').innerHTML = `
    <div class="result-card">
      <div class="res-label">К оплате клиентом</div>
      <div class="res-price">${fmt(total)}</div>
      <div class="res-sub">
        Ближайший стандарт: <strong>${sz.w}×${sz.h} см</strong> | ${opt.lb}
        <span class="ratio-pill" style="color:${ratioColor}">${ratioDir} ×${ratio.toFixed(3)}</span>
      </div>
      <div class="bd">
        <div class="bd-row">
          <span class="nm">База (${baseLabel} при ${sz.w}×${sz.h})</span>
          <span>${fmt(base)}</span>
        </div>
        <div class="bd-row">
          <span class="nm">× коэф. (${w}+${h}) / (${sz.w}+${sz.h})</span>
          <span>${fmt(scaledBase)}</span>
        </div>
        ${figCost!==0 ? `<div class="bd-row">
          <span class="nm">Фигуры: ${figLabel}</span>
          <span>+${fmt(figCost)}</span>
        </div>` : ''}
        ${artistExtra>0 ? `<div class="bd-row">
          <span class="nm">Доп. доработка художника</span>
          <span>+${fmt(artistExtra)}</span>
        </div>` : ''}
        <div class="bd-row total">
          <span>ИТОГО</span>
          <span>${fmt(total)}</span>
        </div>
      </div>
    </div>
    ${warn}
  `;
}
</script>
</body>
</html>
