<meta charset="UTF-8">

<title>Прайс-лист — Portraithy & Sambanis</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #1a1a2e; }
.header { background: #1a1a2e; color: #fff; padding: 16px 20px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
.header h1 { font-size: 1rem; font-weight: 800; margin-bottom: 10px; }
.tabs { display: flex; background: rgba(255,255,255,0.1); border-radius: 10px; padding: 3px; width: fit-content; margin-bottom: 8px; }
.tab { padding: 7px 18px; border: none; border-radius: 8px; background: transparent; cursor: pointer; font-weight: 700; font-size: 0.88rem; color: rgba(255,255,255,0.7); transition: all 0.2s; }
.tab.active { background: #fff; color: #1a1a2e; }
.style-tabs { display: none; flex-wrap: wrap; gap: 6px; }
.style-tabs.visible { display: flex; }
.stab { padding: 5px 14px; border: 1.5px solid rgba(255,255,255,0.3); border-radius: 8px; background: transparent; cursor: pointer; font-size: 0.8rem; font-weight: 700; color: rgba(255,255,255,0.7); transition: all 0.2s; }
.stab.active { background: rgba(255,255,255,0.2); border-color: #fff; color: #fff; }
.container { max-width: 900px; margin: 0 auto; padding: 16px; }
.section { display: none; }
.section.visible { display: block; }
.size-block { background: #fff; border-radius: 12px; margin-bottom: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.size-header { background: #1a1a2e; color: #fff; padding: 10px 16px; display: flex; align-items: baseline; gap: 10px; }
.size-cm { font-size: 1.05rem; font-weight: 800; }
.size-in { font-size: 0.78rem; opacity: 0.6; }
.delivery-badge { margin-left: auto; font-size: 0.72rem; background: rgba(255,255,255,0.15); padding: 3px 9px; border-radius: 6px; }
table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
th { background: #f5f6fa; padding: 8px 12px; text-align: left; font-size: 0.72rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; color: #888; border-bottom: 1px solid #eee; }
th.right { text-align: right; }
td { padding: 9px 12px; border-bottom: 1px solid #f0f2f5; vertical-align: middle; }
td.right { text-align: right; }
tr:last-child td { border-bottom: none; }
tr:hover td { background: #fafbff; }
.fig-badge { display: inline-block; background: #e8eaf0; border-radius: 6px; padding: 2px 8px; font-size: 0.8rem; font-weight: 700; color: #444; }
.price-disc { font-weight: 800; color: #1a1a2e; font-size: 0.95rem; }
.price-full { color: #999; text-decoration: line-through; font-size: 0.85rem; }
.saving { display: inline-block; background: #e8f5e9; color: #2e7d32; font-size: 0.72rem; font-weight: 700; padding: 2px 6px; border-radius: 5px; margin-left: 4px; }
.del-sep { background: #f8f9ff; }
.del-sep td { padding: 6px 12px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #aaa; border-bottom: 1px solid #eee; }
.no-disc { color: #999; font-style: italic; font-size: 0.82rem; }
@media print {
  .header { position: static; }
  .size-block { break-inside: avoid; }
}
</style>
</head>

// ── RENDER ─────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
const fmtP = v => v != null ? '$' + v.toFixed(2) : '—';

function saving(disc, full) {
  if (!disc || !full) return '';
  const pct = Math.round((1 - disc/full) * 100);
  return `<span class="saving">−${pct}%</span>`;
}

function renderData(data, discLabel) {
  return data.map(size => {
    const groupsHTML = size.groups.map((g, gi) => {
      const sepRow = size.groups.length > 1
        ? `<tr class="del-sep"><td colspan="3">${g.del}</td></tr>` : '';
      const rows = g.rows.map(r => {
        const hasDisc = r.disc != null;
        return `<tr>
          <td><span class="fig-badge">${r.fig}</span></td>
          <td class="right">
            ${hasDisc
              ? `<span class="price-disc">${fmtP(r.disc)}</span> ${saving(r.disc, r.full)}`
              : `<span class="no-disc">нет данных</span>`}
          </td>
          <td class="right"><span class="price-full">${fmtP(r.full)}</span></td>
        </tr>`;
      }).join('');
      return sepRow + rows;
    }).join('');

    const oneDel = size.groups.length === 1 ? size.groups[0].del : '';
    return `
      <div class="size-block">
        <div class="size-header">
          <span class="size-cm">${size.cm} см</span>
          <span class="size-in">${size.inches}"</span>
          ${oneDel ? `<span class="delivery-badge">${oneDel}</span>` : ''}
        </div>
        <table>
          <thead><tr>
            <th>Фигуры</th>
            <th class="right">${discLabel}</th>
            <th class="right">Без скидки</th>
          </tr></thead>
          <tbody>${groupsHTML}</tbody>
        </table>
      </div>`;
  }).join('');
}

// Build once
$('sec-pt').innerHTML      = renderData(PT_DATA,  'Цена клиенту (−26%)');
$('sec-sb-imp').innerHTML  = renderData(SB_DATA.imp, 'Цена клиенту (−33%)');
$('sec-sb-rea').innerHTML  = renderData(SB_DATA.rea, 'Цена клиенту (−33%)');
$('sec-sb-ren').innerHTML  = renderData(SB_DATA.ren, 'Цена клиенту (−33%)');

// ── NAVIGATION ─────────────────────────────────────────────────────────────
let shop = 'pt', style = 'imp';

function setShop(s) {
  shop = s;
  document.querySelectorAll('.tab').forEach((t, i) => t.classList.toggle('active', i===(s==='pt'?0:1)));
  $('style-tabs').classList.toggle('visible', s === 'sb');
  updateVisible();
}
function setStyle(s) {
  style = s;
  document.querySelectorAll('.stab').forEach((b, i) => b.classList.toggle('active', ['imp','rea','ren'][i]===s));
  updateVisible();
}
function updateVisible() {
  ['sec-pt','sec-sb-imp','sec-sb-rea','sec-sb-ren'].forEach(id => $('id'.replace('id', id) || id).classList.remove('visible'));
  document.querySelectorAll('.section').forEach(s => s.classList.remove('visible'));
  const id = shop === 'pt' ? 'sec-pt' : `sec-sb-${style}`;
  $(id).classList.add('visible');
}
