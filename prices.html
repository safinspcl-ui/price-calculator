<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Прайс-лист — Portraithy & Sambanis</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #1a1a2e; }

.header { background: #1a1a2e; color: #fff; padding: 14px 20px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
.header h1 { font-size: 1rem; font-weight: 800; margin-bottom: 10px; }
.tabs { display: flex; background: rgba(255,255,255,0.1); border-radius: 10px; padding: 3px; width: fit-content; margin-bottom: 8px; }
.tab { padding: 7px 18px; border: none; border-radius: 8px; background: transparent; cursor: pointer; font-weight: 700; font-size: 0.88rem; color: rgba(255,255,255,0.7); transition: all 0.2s; }
.tab.active { background: #fff; color: #1a1a2e; }
.style-tabs { display: none; flex-wrap: wrap; gap: 6px; }
.style-tabs.visible { display: flex; }
.stab { padding: 5px 14px; border: 1.5px solid rgba(255,255,255,0.3); border-radius: 8px; background: transparent; cursor: pointer; font-size: 0.8rem; font-weight: 700; color: rgba(255,255,255,0.7); transition: all 0.2s; }
.stab.active { background: rgba(255,255,255,0.2); border-color: #fff; color: #fff; }

.container { max-width: 1200px; margin: 0 auto; padding: 16px; }
.section { display: none; }
.section.visible { display: block; }

.matrix-wrap { background: #fff; border-radius: 14px; overflow-x: auto; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.matrix-title { background: #1a1a2e; color: #fff; padding: 12px 18px; font-size: 0.9rem; font-weight: 800; border-radius: 14px 14px 0 0; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.note-badge { background: rgba(255,255,255,0.15); padding: 3px 10px; border-radius: 6px; font-size: 0.72rem; font-weight: 700; }
.legend { margin-left: auto; font-size: 0.72rem; opacity: 0.55; }

table.matrix { border-collapse: collapse; min-width: 100%; font-size: 0.82rem; }
table.matrix th { padding: 8px 8px; text-align: center; font-size: 0.72rem; font-weight: 800; background: #f5f6fa; color: #666; border: 1px solid #e8eaf0; white-space: nowrap; }
table.matrix th.size-col { text-align: left; min-width: 78px; padding-left: 12px; }
table.matrix th.del-col { min-width: 96px; text-align: left; padding-left: 10px; }
table.matrix td { padding: 6px 8px; text-align: center; border: 1px solid #e8eaf0; white-space: nowrap; vertical-align: middle; }
table.matrix td.size-lbl { text-align: left; padding-left: 12px; font-weight: 800; background: #f8f9ff; color: #1a1a2e; font-size: 0.8rem; border-right: 1px solid #d0d4e8; }
table.matrix td.del-lbl { text-align: left; padding-left: 10px; font-size: 0.72rem; font-weight: 600; color: #555; background: #fafbff; border-right: 2px solid #d0d4e8; }
table.matrix td.avail { background: #e8f5e9; }
table.matrix td.na { background: #fff3e0; color: #ccc; font-weight: 400; font-size: 0.76rem; }
table.matrix tr:hover td.avail { filter: brightness(0.96); }
table.matrix tr:hover td.size-lbl { background: #f0f2ff; }

.pt-price { font-weight: 800; color: #1b5e20; font-size: 0.84rem; }
.sb-disc { font-weight: 800; color: #1b5e20; font-size: 0.8rem; }
.sb-full { color: #aaa; font-size: 0.68rem; text-decoration: line-through; }

@media (max-width: 700px) {
  table.matrix th, table.matrix td { padding: 4px 4px; font-size: 0.65rem; }
  table.matrix th.size-col, table.matrix td.size-lbl { min-width: 56px; padding-left: 6px; }
  th.del-col, td.del-lbl { min-width: 72px; padding-left: 6px; }
  .pt-price { font-size: 0.72rem; }
  .sb-disc { font-size: 0.68rem; }
  .sb-full { font-size: 0.58rem; }
}
</style>
</head>
<body>

<div class="header">
  <h1>Прайс-лист</h1>
  <div class="tabs">
    <button class="tab active" onclick="setShop('pt')">Portraithy</button>
    <button class="tab" onclick="setShop('sb')">Sambanis</button>
  </div>
  <div class="style-tabs" id="style-tabs">
    <button class="stab active" onclick="setStyle('imp')">Импрессионизм</button>
    <button class="stab" onclick="setStyle('rea')">Реализм</button>
    <button class="stab" onclick="setStyle('ren')">Ренессанс</button>

function buildPT() {
  const cols = Array.from({length: PT_COLS}, (_, i) => i);
  const thead = `<thead><tr>
    <th class="size-col">Размер</th>
    ${cols.map(i => `<th>${i}&thinsp;Ф</th>`).join('')}

const SB_COLS = 9; // 1Ф–9Ф
const SB_LABELS = { imp:'Импрессионизм — скидка 33%', rea:'Реализм — скидка 33%', ren:'Ренессанс — скидка 33%' };

function buildSB(key) {
  const rows = SB_MATRIX[key];
  const figCols = Array.from({length: SB_COLS}, (_, i) => i + 1);

  const thead = `<thead><tr>
    <th class="size-col">Размер</th>
    <th class="del-col">Доставка</th>
    ${figCols.map(i => `<th>${i}&thinsp;Ф</th>`).join('')}
  </tr></thead>`;

  // Detect which sizes appear twice (rowspan=2)
  const sizeCount = {};
  rows.forEach(r => sizeCount[r.size] = (sizeCount[r.size]||0) + 1);
  const sizeEmitted = {};

  const tbody = rows.map(row => {
    const isFirst = !sizeEmitted[row.size];
    sizeEmitted[row.size] = true;
    const span = sizeCount[row.size];

    const sizeCell = isFirst
      ? `<td class="size-lbl" rowspan="${span}">${row.size}</td>`
      : '';
    const delCell = `<td class="del-lbl">${row.del}</td>`;
    const cells = row.cells.map(c =>
      c == null
        ? `<td class="na">—</td>`
        : `<td class="avail"><span class="sb-disc">$${c.d.toFixed(2)}</span><br><span class="sb-full">$${c.f.toFixed(2)}</span></td>`
    ).join('');
    return `<tr>${sizeCell}${delCell}${cells}</tr>`;
  }).join('');

  return `<div class="matrix-wrap">
    <div class="matrix-title">
      Sambanis · ${SB_LABELS[key]}
      <span class="legend">зелёный = цена клиента · серый = без скидки</span>
    </div>
    <table class="matrix"><thead>${thead}</thead><tbody>${tbody}</tbody></table>
  </div>`;
}

// ── BUILD ──────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
$('sec-pt').innerHTML     = buildPT();
$('sec-sb-imp').innerHTML = buildSB('imp');
$('sec-sb-rea').innerHTML = buildSB('rea');
$('sec-sb-ren').innerHTML = buildSB('ren');

// ── NAV ────────────────────────────────────────────────────────────────────
let shop = 'pt', style = 'imp';
function setShop(s) {
  shop = s;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===(s==='pt'?0:1)));
  $('style-tabs').classList.toggle('visible', s==='sb');
  show();
}
function setStyle(s) {
  style = s;
  document.querySelectorAll('.stab').forEach((b,i) => b.classList.toggle('active', ['imp','rea','ren'][i]===s));
  show();
}
function show() {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('visible'));
  $(shop==='pt' ? 'sec-pt' : `sec-sb-${style}`).classList.add('visible');
}
</script>
</body>
</html>
