<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Прайс-лист — Portraithy & Sambanis</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f0f2f5; color: #1a1a2e; }

/* ── HEADER ── */
.header { background: #1a1a2e; color: #fff; padding: 14px 20px; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
.header h1 { font-size: 1rem; font-weight: 800; margin-bottom: 10px; }
.tabs { display: flex; background: rgba(255,255,255,0.1); border-radius: 10px; padding: 3px; width: fit-content; margin-bottom: 8px; }
.tab { padding: 7px 18px; border: none; border-radius: 8px; background: transparent; cursor: pointer; font-weight: 700; font-size: 0.88rem; color: rgba(255,255,255,0.7); transition: all 0.2s; }
.tab.active { background: #fff; color: #1a1a2e; }
.style-tabs { display: none; flex-wrap: wrap; gap: 6px; }
.style-tabs.visible { display: flex; }
.stab { padding: 5px 14px; border: 1.5px solid rgba(255,255,255,0.3); border-radius: 8px; background: transparent; cursor: pointer; font-size: 0.8rem; font-weight: 700; color: rgba(255,255,255,0.7); transition: all 0.2s; }
.stab.active { background: rgba(255,255,255,0.2); border-color: #fff; color: #fff; }

.container { max-width: 1000px; margin: 0 auto; padding: 16px; }
.section { display: none; }
.section.visible { display: block; }

/* ── MATRIX TABLE (Portraithy) ── */
.matrix-wrap { background: #fff; border-radius: 14px; overflow-x: auto; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.matrix-title { background: #1a1a2e; color: #fff; padding: 12px 18px; font-size: 0.9rem; font-weight: 800; border-radius: 14px 14px 0 0; display: flex; align-items: center; gap: 12px; }
.matrix-title span { font-size: 0.75rem; opacity: 0.55; font-weight: 400; }
.note-badge { background: rgba(255,255,255,0.15); padding: 3px 10px; border-radius: 6px; font-size: 0.72rem; font-weight: 700; }
table.matrix { border-collapse: collapse; min-width: 100%; font-size: 0.84rem; }
table.matrix th { padding: 9px 10px; text-align: center; font-size: 0.75rem; font-weight: 800; background: #f5f6fa; color: #666; border: 1px solid #e8eaf0; white-space: nowrap; }
table.matrix th.size-col { text-align: left; min-width: 90px; padding-left: 14px; }
table.matrix td { padding: 8px 10px; text-align: center; border: 1px solid #e8eaf0; font-weight: 700; font-size: 0.85rem; white-space: nowrap; }
table.matrix td.size-lbl { text-align: left; padding-left: 14px; font-weight: 800; background: #f8f9ff; color: #1a1a2e; font-size: 0.82rem; border-right: 2px solid #d0d4e8; }
table.matrix td.avail { background: #e8f5e9; color: #1b5e20; }
table.matrix td.avail.hi { background: #c8e6c9; }
table.matrix td.na { background: #fff3e0; color: #ccc; font-weight: 400; font-size: 0.8rem; }
table.matrix tr:hover td.avail { filter: brightness(0.95); }

/* ── VERTICAL TABLE (Sambanis) ── */
.size-block { background: #fff; border-radius: 12px; margin-bottom: 12px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
.size-header { background: #1a1a2e; color: #fff; padding: 10px 16px; display: flex; align-items: baseline; gap: 10px; }
.size-cm { font-size: 1.05rem; font-weight: 800; }
.size-in { font-size: 0.78rem; opacity: 0.6; }
.delivery-badge { margin-left: auto; font-size: 0.72rem; background: rgba(255,255,255,0.15); padding: 3px 9px; border-radius: 6px; }
table.vtable { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
table.vtable th { background: #f5f6fa; padding: 8px 12px; text-align: left; font-size: 0.72rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.05em; color: #888; border-bottom: 1px solid #eee; }
table.vtable th.right { text-align: right; }
table.vtable td { padding: 9px 12px; border-bottom: 1px solid #f0f2f5; vertical-align: middle; }
table.vtable td.right { text-align: right; }
table.vtable tr:last-child td { border-bottom: none; }
table.vtable tr:hover td { background: #fafbff; }
.fig-badge { display: inline-block; background: #e8eaf0; border-radius: 6px; padding: 2px 8px; font-size: 0.8rem; font-weight: 700; color: #444; }
.price-disc { font-weight: 800; color: #1a1a2e; font-size: 0.95rem; }
.price-full { color: #999; text-decoration: line-through; font-size: 0.85rem; }
.saving { display: inline-block; background: #e8f5e9; color: #2e7d32; font-size: 0.72rem; font-weight: 700; padding: 2px 6px; border-radius: 5px; margin-left: 4px; }
.del-sep td { padding: 6px 12px; font-size: 0.75rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: #aaa; border-bottom: 1px solid #eee; background: #f8f9ff; }

@media (max-width: 600px) {
  table.matrix th, table.matrix td { padding: 6px 6px; font-size: 0.75rem; }
  table.matrix th.size-col, table.matrix td.size-lbl { min-width: 70px; padding-left: 8px; }
}
</style>
</head>

function renderVertical(data, discLabel) {
  return data.map(size => {
    const groupsHTML = size.groups.map((g, gi) => {
      const sep = size.groups.length > 1 ? `<tr class="del-sep"><td colspan="3">${g.del}</td></tr>` : '';
      const rows = g.rows.map(r => `<tr>
        <td><span class="fig-badge">${r.fig}</span></td>
        <td class="right"><span class="price-disc">${fmtP(r.disc)}</span> ${saving(r.disc,r.full)}</td>
        <td class="right"><span class="price-full">${fmtP(r.full)}</span></td>
      </tr>`).join('');
      return sep + rows;
    }).join('');
    const oneDel = size.groups.length === 1 ? size.groups[0].del : '';
    return `<div class="size-block">
      <div class="size-header">
        <span class="size-cm">${size.cm} см</span>
        <span class="size-in">${size.in}"</span>
        ${oneDel ? `<span class="delivery-badge">${oneDel}</span>` : ''}
      </div>
      <table class="vtable">
        <thead><tr><th>Фигуры</th><th class="right">${discLabel}</th><th class="right">Без скидки</th></tr></thead>
        <tbody>${groupsHTML}</tbody>
      </table>
    </div>`;
  }).join('');
}

// ── BUILD ──────────────────────────────────────────────────────────────────
const $ = id => document.getElementById(id);
$('sec-pt').innerHTML     = buildMatrix();
$('sec-sb-imp').innerHTML = renderVertical(SB_DATA.imp, 'Цена клиенту (−33%)');
$('sec-sb-rea').innerHTML = renderVertical(SB_DATA.rea, 'Цена клиенту (−33%)');
$('sec-sb-ren').innerHTML = renderVertical(SB_DATA.ren, 'Цена клиенту (−33%)');

// ── NAV ────────────────────────────────────────────────────────────────────
let shop = 'pt', style = 'imp';
function setShop(s) {
  shop = s;
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===(s==='pt'?0:1)));
  $('style-tabs').classList.toggle('visible', s==='sb');
  show();
}
function setStyle(s) {
  style = s;
  document.querySelectorAll('.stab').forEach((b,i) => b.classList.toggle('active', ['imp','rea','ren'][i]===s));
  show();
}
function show() {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('visible'));
  $(shop==='pt' ? 'sec-pt' : `sec-sb-${style}`).classList.add('visible');
}
</script>
